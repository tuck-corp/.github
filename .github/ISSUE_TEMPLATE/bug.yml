name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: []
body:
  - type: checkboxes
    id: type
    attributes:
      label: Issue Type
      options:
        - label: "Bug"

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the bug? What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run command X
        2. Open file Y
        3. See error Z
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, package version, etc.
      placeholder: |
        - OS: Windows 11
        - Node: 20.10.0
        - Package: @jabfy-corp/tts@0.1.0

  - type: checkboxes
    id: severity
    attributes:
      label: Severity
      options:
        - label: "Critical (blocks usage)"
        - label: "High (major functionality broken)"
        - label: "Medium (workaround exists)"
        - label: "Low (minor issue)"
